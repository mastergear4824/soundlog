name: Soundlog
options:
  bundleIdPrefix: com.aiclude
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Soundlog:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SoundLog
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiclude.soundlog
        CODE_SIGN_ENTITLEMENTS: Sources/Soundlog.entitlements
        ENABLE_HARDENED_RUNTIME: false
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
    postBuildScripts:
      - name: Bundle vendored binaries (yt-dlp, ffmpeg)
        basedOnDependencyAnalysis: false
        script: |
          set -e
          BIN="$BUILT_PRODUCTS_DIR/$WRAPPER_NAME/Contents/Resources/bin"
          if [ -d "$SRCROOT/vendor" ]; then
            mkdir -p "$BIN"
            for f in yt-dlp ffmpeg; do
              if [ -f "$SRCROOT/vendor/$f" ]; then
                cp -f "$SRCROOT/vendor/$f" "$BIN/$f"
                chmod +x "$BIN/$f"
              fi
            done
            echo "bundled binaries into $BIN"
          else
            echo "warning: vendor/ missing — app will fall back to system yt-dlp/ffmpeg"
          fi
